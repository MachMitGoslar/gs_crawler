<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job – Goslar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-dead-pixel-10:   #fafafaff;
      --color-dead-pixel-25:   #f5f5f5ff;
      --color-dead-pixel-900:  #6f6f6eff;
      --color-dead-pixel-1300: #303030ff;
      --color-dead-pixel-1400: #222222ff;
      --color-ripe-mango-100:  #fff9e9ff;
      --color-ripe-mango-300:  #feefc3ff;
      --color-ripe-mango-700:  #fcce4cff;
      --color-ripe-mango-1200: #866811ff;
      --color-ripe-mango-1300: #644e0cff;
      --color-ripe-mango-1400: #433408ff;
      --color-ferocious-800: #e84237ff;
      --border-radius-5: 12px;
      --border-radius-pill: 10000px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-dead-pixel-10);
      color: var(--color-dead-pixel-1300);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: var(--color-ripe-mango-1300);
      color: #fff;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header a {
      color: #fff;
      text-decoration: none;
      font-size: 1.25rem;
      line-height: 1;
      opacity: 0.85;
      transition: opacity 0.15s;
    }
    header a:hover { opacity: 1; }
    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    #loading {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--color-dead-pixel-900);
      font-size: 0.875rem;
    }
    #error {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--color-ferocious-800);
      font-size: 0.875rem;
    }

    #content { display: none; }

    .card {
      max-width: 520px;
      margin: 1.25rem auto;
      background: #fff;
      border-radius: var(--border-radius-5);
      border: 1px solid rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .logo-wrap {
      width: 100%;
      background: var(--color-dead-pixel-25);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      min-height: 160px;
    }
    .logo-wrap img {
      max-width: 100%;
      max-height: 160px;
      object-fit: contain;
    }
    .logo-placeholder {
      width: 100%;
      min-height: 160px;
    }

    .card-body { padding: 1.25rem 1.25rem 1.5rem; }

    .vendor-name {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.022em;
      line-height: 1.2;
      color: var(--color-dead-pixel-1400);
      margin-bottom: 0.5rem;
    }
    .market-event {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      background: var(--color-ripe-mango-100);
      border-left: 3px solid var(--color-ripe-mango-700);
      border-radius: 0 4px 4px 0;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
    }
    .market-event-date {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-ripe-mango-1300);
    }
    .market-event-location {
      font-size: 0.8125rem;
      color: var(--color-ripe-mango-1200);
    }
    .vendor-summary {
      font-size: 0.875rem;
      color: var(--color-dead-pixel-900);
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .vendor-description {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--color-dead-pixel-1300);
    }
    .vendor-description p { margin-bottom: 0.5rem; }
    .vendor-description ul, .vendor-description ol { padding-left: 1.2rem; margin: 0.5rem 0; }
    .vendor-description a { color: var(--color-ripe-mango-1300); }

    .back-btn {
      display: block;
      text-align: center;
      max-width: 520px;
      margin: 0 auto 1.5rem;
      padding: 0.625rem 1rem;
      background: var(--color-ripe-mango-700);
      color: var(--color-ripe-mango-1400);
      border-radius: var(--border-radius-pill);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      transition: background 0.15s ease;
    }
    .back-btn:hover { background: var(--color-ripe-mango-300); }
  </style>
</head>
<body>
<header>
  <a id="back-btn" href="/jobs.html">←</a>
  <h1 id="market-name"></h1>
</header>

<div id="loading">Job wird geladen…</div>
<div id="error"></div>

<div id="content">
  <div class="card">
    <div class="logo-wrap" id="logo-wrap">
      <div class="logo-placeholder"></div>
    </div>
    <div class="card-body">
      <div class="vendor-name" id="vendor-name"></div>
      <div class="market-event" id="market-event" style="display:none">
        <div class="market-event-date" id="market-event-date"></div>
        <div class="market-event-location" id="market-event-location"></div>
      </div>
      <div class="vendor-summary" id="vendor-summary"></div>
      <div class="vendor-description" id="vendor-description"></div>
    </div>
  </div>
  <a class="back-btn" id="back-link" href="/jobs.html">← Zur Übersicht</a>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const source = params.get('source') || 'bundesapi';
  const INDEX_PAGE = '/jobs.html';

  document.getElementById('back-btn').href = INDEX_PAGE;
  document.getElementById('back-link').href = INDEX_PAGE;

  async function load() {
    if (!id) {
      showError('Kein Job angegeben. Bitte gehe zurück zur Übersicht.');
      return;
    }

    try {
      const res = await fetch('/job-details-data?source=' + encodeURIComponent(source) + '&id=' + encodeURIComponent(id));
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const job = await res.json();

      document.title = (job.title ?? 'Job') + ' – Landkreis Goslar';
      document.getElementById('vendor-name').textContent = job.title || '';
      document.getElementById('vendor-summary').textContent = job.summary || job.employer || '';
      document.getElementById('vendor-description').innerHTML = renderRichText(job.description_html || '');

      if (job.published_at || job.location) {
        if (job.published_at) document.getElementById('market-event-date').textContent = 'Veröffentlicht: ' + job.published_at;
        if (job.location) document.getElementById('market-event-location').textContent = job.location;
        document.getElementById('market-event').style.display = 'flex';
      }

      if (job.logo_url) {
        const img = document.createElement('img');
        img.src = job.logo_url;
        img.alt = job.employer || job.title || 'Logo';
        img.onerror = () => img.replaceWith(makePlaceholder());
        const wrap = document.getElementById('logo-wrap');
        wrap.innerHTML = '';
        wrap.appendChild(img);
      }

      if (job.external_url) {
        document.getElementById('back-link').textContent = 'Externes Angebot öffnen →';
        document.getElementById('back-link').href = job.external_url;
        document.getElementById('back-link').target = '_blank';
        document.getElementById('back-link').rel = 'noopener noreferrer';
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } catch (e) {
      showError('Job konnte nicht geladen werden: ' + e.message);
    }
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.textContent = msg;
  }

  function makePlaceholder() {
    const d = document.createElement('div');
    d.className = 'logo-placeholder';
    return d;
  }

  function renderRichText(content) {
    if (!content) return '';
    if (/<[a-z][\s\S]*>/i.test(content)) return content;
    return renderMarkdown(content);
  }

  function renderMarkdown(markdown) {
    const lines = String(markdown).replace(/\r\n/g, '\n').split('\n');
    const html = [];
    let inList = false;
    let paragraph = [];

    const flushParagraph = () => {
      if (!paragraph.length) return;
      html.push('<p>' + inlineMarkdown(paragraph.join(' ').trim()) + '</p>');
      paragraph = [];
    };

    const closeList = () => {
      if (!inList) return;
      html.push('</ul>');
      inList = false;
    };

    for (const rawLine of lines) {
      const line = rawLine.trim();
      if (!line) {
        flushParagraph();
        closeList();
        continue;
      }

      const heading = line.match(/^(#{1,6})\s+(.*)$/);
      if (heading) {
        flushParagraph();
        closeList();
        const level = Math.min(heading[1].length, 6);
        html.push('<h' + level + '>' + inlineMarkdown(heading[2]) + '</h' + level + '>');
        continue;
      }

      const listItem = line.match(/^[-*]\s+(.*)$/);
      if (listItem) {
        flushParagraph();
        if (!inList) {
          html.push('<ul>');
          inList = true;
        }
        html.push('<li>' + inlineMarkdown(listItem[1]) + '</li>');
        continue;
      }

      closeList();
      paragraph.push(line);
    }

    flushParagraph();
    closeList();
    return html.join('');
  }

  function inlineMarkdown(text) {
    let html = escapeHtml(text);
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    return html;
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  load();
</script>
</body>
</html>
