<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wochenmarkt Goslar – Alle Stände</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-dead-pixel-10:   #fafafaff;
      --color-dead-pixel-25:   #f5f5f5ff;
      --color-dead-pixel-100:  #f1f1f1ff;
      --color-dead-pixel-200:  #ecececff;
      --color-dead-pixel-300:  #d9d9d9ff;
      --color-dead-pixel-900:  #6f6f6eff;
      --color-dead-pixel-1200: #3f3f3eff;
      --color-dead-pixel-1300: #303030ff;
      --color-dead-pixel-1400: #222222ff;

      --color-ripe-mango-100:  #fff9e9ff;
      --color-ripe-mango-300:  #feefc3ff;
      --color-ripe-mango-700:  #fcce4cff;
      --color-ripe-mango-900:  #eab51dff;
      --color-ripe-mango-1100: #a78115ff;
      --color-ripe-mango-1200: #866811ff;
      --color-ripe-mango-1300: #644e0cff;
      --color-ripe-mango-1400: #433408ff;

      --color-ferocious-800: #e84237ff;

      --border-radius-4: 8px;
      --border-radius-5: 12px;
      --border-radius-pill: 10000px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-dead-pixel-10);
      color: var(--color-dead-pixel-1300);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: var(--color-ripe-mango-1300);
      color: #fff;
      padding: 1.5rem 1rem 1.25rem;
      text-align: center;
    }
    header h1 {
      font-size: 1.375rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.022em;
    }
    header p {
      font-size: 0.875rem;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 0.3rem;
    }

    /* ── States ── */
    #loading {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--color-dead-pixel-900);
      font-size: 0.875rem;
    }
    #error {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--color-ferocious-800);
      font-size: 0.875rem;
    }

    /* ── Count bar ── */
    #count {
      display: none;
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-ripe-mango-1400);
      background: var(--color-ripe-mango-700);
      text-align: center;
      letter-spacing: 0.01em;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      padding: 1.25rem 1rem;
      max-width: 1040px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: var(--border-radius-5);
      border: 1px solid rgba(0, 0, 0, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      border-color: rgba(0, 0, 0, 0.12);
    }

    .card-logo {
      width: 100%;
      height: 140px;
      object-fit: contain;
      background: var(--color-dead-pixel-25);
      padding: 1rem;
    }
    .card-logo-placeholder {
      width: 100%;
      height: 140px;
      background: var(--color-dead-pixel-100);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .card-body {
      padding: 0.875rem 1rem 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .card-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--color-dead-pixel-1400);
      line-height: 1.3;
    }
    .card-address {
      font-size: 0.8125rem;
      color: var(--color-dead-pixel-900);
      line-height: 1.4;
    }
    .card-cta {
      margin-top: auto;
      padding-top: 0.75rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--color-ripe-mango-1200);
    }
  </style>
</head>
<body>

<header>
  <h1 id="market-title">Wochenmarkt Goslar</h1>
  <p id="market-subtitle">Alle Stände im Blick</p>
</header>

<div id="loading">Stände werden geladen…</div>
<div id="error"></div>
<div id="count"></div>
<div class="grid" id="grid"></div>

<script>
  const BASE        = location.href.substring(0, location.href.lastIndexOf('/') + 1);
  const INDEX_JSON  = BASE + '070_wochenmarkt_alle.json';
  const CARD_JSON   = BASE + '070_wochenmarkt_card.json';
  const DETAIL_PAGE = BASE + '070_wochenmarkt_detail.html';

  async function load() {
    try {
      const cardRes = await fetch(CARD_JSON);
      if (cardRes.ok) {
        const card = await cardRes.json();
        if (card.title) document.getElementById('market-title').textContent = card.title;
      }

      const res = await fetch(INDEX_JSON);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const vendors = await res.json();

      document.getElementById('loading').style.display = 'none';

      if (!vendors.length) {
        const err = document.getElementById('error');
        err.style.display = 'block';
        err.textContent = 'Für diesen Markt sind noch keine Stände eingetragen.';
        return;
      }

      const countEl = document.getElementById('count');
      countEl.style.display = 'block';
      countEl.textContent = vendors.length + ' Stand' + (vendors.length !== 1 ? 'e' : '');

      const grid = document.getElementById('grid');
      for (const v of vendors) {
        const uuid = extractUuid(v.call_to_action_url);
        const href = uuid ? DETAIL_PAGE + '?id=' + uuid : '#';

        const a = document.createElement('a');
        a.className = 'card';
        a.href = href;

        const logoHtml = v.image_url
          ? '<img class="card-logo" src="' + esc(v.image_url) + '" alt="' + esc(v.title) + '" loading="lazy" onerror="this.replaceWith(placeholder())">'
          : '<div class="card-logo-placeholder">🏪</div>';

        a.innerHTML = logoHtml
          + '<div class="card-body">'
          + '<div class="card-name">'    + esc(v.title)       + '</div>'
          + '<div class="card-address">' + esc(v.description) + '</div>'
          + '<div class="card-cta">Details →</div>'
          + '</div>';

        grid.appendChild(a);
      }
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      const err = document.getElementById('error');
      err.style.display = 'block';
      err.textContent = 'Daten konnten nicht geladen werden: ' + e.message;
    }
  }

  function extractUuid(url) {
    if (!url) return null;
    const m = url.match(/[?&]id=([0-9a-f-]{36})/i)
           || url.match(/070_wochenmarkt_([0-9a-f-]{36})\.json/i);
    return m ? m[1] : null;
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function placeholder() {
    const d = document.createElement('div');
    d.className = 'card-logo-placeholder';
    d.textContent = '🏪';
    return d;
  }

  load();
</script>
</body>
</html>
