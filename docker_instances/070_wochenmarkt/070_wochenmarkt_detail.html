<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stand – Wochenmarkt Goslar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-dead-pixel-10:   #fafafaff;
      --color-dead-pixel-25:   #f5f5f5ff;
      --color-dead-pixel-900:  #6f6f6eff;
      --color-dead-pixel-1300: #303030ff;
      --color-dead-pixel-1400: #222222ff;

      --color-ripe-mango-300:  #feefc3ff;
      --color-ripe-mango-700:  #fcce4cff;
      --color-ripe-mango-1300: #644e0cff;
      --color-ripe-mango-1400: #433408ff;

      --color-ferocious-800: #e84237ff;

      --border-radius-5: 12px;
      --border-radius-pill: 10000px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-dead-pixel-10);
      color: var(--color-dead-pixel-1300);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: var(--color-ripe-mango-1300);
      color: #fff;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header a {
      color: #fff;
      text-decoration: none;
      font-size: 1.25rem;
      line-height: 1;
      opacity: 0.85;
      transition: opacity 0.15s;
    }
    header a:hover { opacity: 1; }
    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* ── States ── */
    #loading {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--color-dead-pixel-900);
      font-size: 0.875rem;
    }
    #error {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--color-ferocious-800);
      font-size: 0.875rem;
    }

    /* ── Card ── */
    #content { display: none; }

    .card {
      max-width: 520px;
      margin: 1.25rem auto;
      background: #fff;
      border-radius: var(--border-radius-5);
      border: 1px solid rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .logo-wrap {
      width: 100%;
      background: var(--color-dead-pixel-25);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      min-height: 160px;
    }
    .logo-wrap img {
      max-width: 100%;
      max-height: 160px;
      object-fit: contain;
    }
    .logo-placeholder { font-size: 4rem; }

    .card-body { padding: 1.25rem 1.25rem 1.5rem; }

    .vendor-name {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.022em;
      line-height: 1.2;
      color: var(--color-dead-pixel-1400);
      margin-bottom: 0.5rem;
    }
    .market-event {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      background: var(--color-ripe-mango-100);
      border-left: 3px solid var(--color-ripe-mango-700);
      border-radius: 0 4px 4px 0;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
    }
    .market-event-date {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-ripe-mango-1300);
    }
    .market-event-location {
      font-size: 0.8125rem;
      color: var(--color-ripe-mango-1200);
    }
    .vendor-summary {
      font-size: 0.875rem;
      color: var(--color-dead-pixel-900);
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .vendor-description {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--color-dead-pixel-1300);
    }
    .vendor-description p { margin-bottom: 0.5rem; }

    /* ── Back button ── */
    .back-btn {
      display: block;
      text-align: center;
      max-width: 520px;
      margin: 0 auto 1.5rem;
      padding: 0.625rem 1rem;
      background: var(--color-ripe-mango-700);
      color: var(--color-ripe-mango-1400);
      border-radius: var(--border-radius-pill);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      transition: background 0.15s ease;
    }
    .back-btn:hover { background: var(--color-ripe-mango-300); }
  </style>
</head>
<body>

<header>
  <a id="back-btn" href="070_wochenmarkt_index.html">←</a>
  <h1 id="market-name">Stand Details</h1>
</header>

<div id="loading">Stand wird geladen…</div>
<div id="error"></div>

<div id="content">
  <div class="card">
    <div class="logo-wrap" id="logo-wrap">
      <div class="logo-placeholder">🏪</div>
    </div>
    <div class="card-body">
      <div class="vendor-name"        id="vendor-name"></div>
      <div class="market-event" id="market-event" style="display:none">
        <div class="market-event-date"     id="market-event-date"></div>
        <div class="market-event-location" id="market-event-location"></div>
      </div>
      <div class="vendor-summary"     id="vendor-summary"></div>
      <div class="vendor-description" id="vendor-description"></div>
    </div>
  </div>
  <a class="back-btn" id="back-link" href="070_wochenmarkt_index.html">← Alle Stände</a>
</div>

<script>
  const BASE       = location.href.substring(0, location.href.lastIndexOf('/') + 1);
  const INDEX_PAGE = BASE + '070_wochenmarkt_index.html';
  const CARD_JSON  = BASE + '070_wochenmarkt_card.json';

  document.getElementById('back-btn').href  = INDEX_PAGE;
  document.getElementById('back-link').href = INDEX_PAGE;

  async function load() {
    const cardRes = await fetch(CARD_JSON).catch(() => null);
    if (cardRes && cardRes.ok) {
      const card = await cardRes.json();
      if (card.title) document.getElementById('market-name').textContent = card.title;
    }

    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    if (!id) {
      showError('Kein Stand angegeben. Bitte gehe zurück zur Übersicht.');
      return;
    }

    try {
      const res = await fetch(BASE + '070_wochenmarkt_' + id + '.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const v = await res.json();

      document.title = (v.title ?? 'Stand') + ' – Wochenmarkt Goslar';
      document.getElementById('vendor-name').textContent    = v.title   ?? '';
      document.getElementById('vendor-summary').textContent = v.summary ?? '';

      if (v.description) {
        document.getElementById('vendor-description').innerHTML = v.description;

        // Extract date and location from description text
        // Pattern: "am Freitag, 13. März 2026 in Jakobikirchhof Goslar dabei"
        const text = v.description.replace(/<[^>]+>/g, ' ');
        const m = text.match(/am\s+(\w+,\s+\d+\.\s+\w+\s+\d{4})\s+in\s+([^\.]+?)\s+dabei/);
        if (m) {
          document.getElementById('market-event-date').textContent     = m[1];
          document.getElementById('market-event-location').textContent = m[2].trim();
          document.getElementById('market-event').style.display        = 'flex';
        }
      }

      const imgs = v.images ?? [];
      if (imgs.length && imgs[0].url) {
        const img = document.createElement('img');
        img.src = imgs[0].url;
        img.alt = v.title ?? 'Logo';
        img.onerror = () => img.replaceWith(makePlaceholder());
        const wrap = document.getElementById('logo-wrap');
        wrap.innerHTML = '';
        wrap.appendChild(img);
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

    } catch (e) {
      showError('Stand konnte nicht geladen werden: ' + e.message);
    }
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.textContent = msg;
  }

  function makePlaceholder() {
    const d = document.createElement('div');
    d.className = 'logo-placeholder';
    d.textContent = '🏪';
    return d;
  }

  load();
</script>
</body>
</html>
